---
# Build the devcontainer image with Buildah and push it to the GitLab
# Container Registry of this project ($CI_REGISTRY_IMAGE).

stages:
  - build

build-image:
  stage: build
  image: quay.io/buildah/stable
  variables:
    # Rootless-friendly settings for Buildah inside a CI container
    STORAGE_DRIVER: vfs
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
    # Outbound HTTP(S) proxy is provided via the project CI/CD variables
    # HTTP_PROXY and HTTPS_PROXY. Internal hosts must bypass it:
    NO_PROXY: "registry.cheopsnet.ch,git.cheopsnet.ch,.cheopsnet.ch,localhost,127.0.0.1,::1"
    no_proxy: "registry.cheopsnet.ch,git.cheopsnet.ch,.cheopsnet.ch,localhost,127.0.0.1,::1"
  before_script:
    # Normalize proxy variables (tools read either case); buildah bud propagates
    # these into the build automatically (--http-proxy is on by default).
    - |
      # CI/CD variables may carry stray whitespace/newlines or omit the scheme.
      sanitize() {
        v="$(printf '%s' "$1" | tr -d '[:space:]')"
        case "$v" in ""|http://*|https://*) ;; *) v="http://$v" ;; esac
        printf '%s' "$v"
      }
      export HTTP_PROXY="$(sanitize "${HTTP_PROXY:-$http_proxy}")"  http_proxy="$HTTP_PROXY"
      export HTTPS_PROXY="$(sanitize "${HTTPS_PROXY:-$https_proxy}")" https_proxy="$HTTPS_PROXY"
      echo "🌐 Proxy configured: ${HTTPS_PROXY:+yes} | no_proxy: ${no_proxy}"
    # The internal registry uses a private CA. Preferred: provide the CA via the
    # REGISTRY_CA_PEM CI/CD variable. Fallback: grab the chain the server presents.
    - |
      ANCHOR=/etc/pki/ca-trust/source/anchors/registry-ca.crt
      if [ -n "$REGISTRY_CA_PEM" ]; then
        echo "🔐 Installing CA from REGISTRY_CA_PEM"
        printf '%s\n' "$REGISTRY_CA_PEM" > "$ANCHOR"
      else
        # The registry serves a public cert (Thawte/DigiCert) but omits the
        # intermediate. Capture what it sends, then follow the leaf's AIA
        # "CA Issuers" link to fetch the missing intermediate so Go can build
        # the chain up to the DigiCert root already shipped in the container.
        command -v openssl >/dev/null || dnf install -y --setopt=install_weak_deps=False openssl
        host="${CI_REGISTRY%%:*}"; port="${CI_REGISTRY##*:}"; [ "$host" = "$port" ] && port=443
        echo "🔐 Building trust chain for ${host}:${port}"
        openssl s_client -connect "${host}:${port}" -servername "$host" -showcerts </dev/null 2>/dev/null \
          | awk '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/' > "$ANCHOR"
        aia=$(openssl x509 -in "$ANCHOR" -noout -text 2>/dev/null \
          | awk '/CA Issuers/{print}' | grep -oE 'https?://[^ ]+' | head -n1)
        if [ -n "$aia" ]; then
          echo "↪︎ Fetching intermediate from ${aia}"
          curl -fsSL "$aia" -o /tmp/issuer.crt || true
          openssl x509 -inform DER -in /tmp/issuer.crt -out /tmp/issuer.pem 2>/dev/null \
            || openssl x509 -inform PEM -in /tmp/issuer.crt -out /tmp/issuer.pem 2>/dev/null || true
          [ -s /tmp/issuer.pem ] && cat /tmp/issuer.pem >> "$ANCHOR"
        fi
      fi
      update-ca-trust
    # Registry is internal/direct: never route login through the forward proxy.
    - env -u HTTP_PROXY -u HTTPS_PROXY -u http_proxy -u https_proxy
        buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      echo "🔨 Building $CI_REGISTRY_IMAGE"
      TAGS="-t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="$TAGS -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      fi
      buildah bud --layers -f Containerfile $TAGS .
    - |
      echo "📦 Pushing tags"
      # Push direct to the internal registry, bypassing the forward proxy.
      unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
      buildah push "$CI_REGISTRY_IMAGE:latest"
      buildah push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      if [ -n "$CI_COMMIT_TAG" ]; then
        buildah push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      fi
      echo "✅ Image published"
  rules:
    # Versioned release: build on git tags
    - if: $CI_COMMIT_TAG
    # Default branch: rebuild only when the image definition changes
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - Containerfile
        - init.sh
    # Manual trigger from the GitLab UI (force rebuild)
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
